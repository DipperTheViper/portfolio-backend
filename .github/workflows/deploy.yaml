name: 'backend deploy'
on:
  push:
    tags:
      - '*.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Prevent hanging jobs

    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated to latest version

      - name: Set environment variables
        run: |
          echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV
          echo "RELEASE=${{ github.event.repository.name }}" >> $GITHUB_ENV

      - name: Build Docker image
        run: |
          docker build -t ${{ github.event.repository.name }}:${{ env.RELEASE_VERSION }} .
          echo "Docker image built successfully"

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_ADDRESS }} >> ~/.ssh/known_hosts

      - name: Test server connection
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} echo 'Connection successful'

      - name: Transfer Docker image with compression
        run: |
          echo "Transferring Docker image with compression..."
          docker save ${{ github.event.repository.name }}:${{ env.RELEASE_VERSION }} | gzip -c | ssh -o ConnectTimeout=30 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} "gunzip -c | docker load"

      - name: Update docker-compose.yml locally with version
        run: |
          sed -i "s|IMAGE_VERSION|${{ env.RELEASE_VERSION }}|g" docker-compose.yml

      - name: Transfer Docker Compose file to remote server
        run: |
          ssh -o ConnectTimeout=10 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} mkdir -p ${{ secrets.SERVER_PATH }}
          scp -o StrictHostKeyChecking=no nginx.conf.template ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }}:${{ secrets.SERVER_PATH }}/
          scp -o StrictHostKeyChecking=no docker-compose.yml ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }}:${{ secrets.SERVER_PATH }}/

      - name: Deploy application
        run: |
          ssh -o ConnectTimeout=30 ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} << 'ENDSSH'
          set -e

          # Check and create nginx_net network if needed
          if ! docker network ls | grep -q "nginx_net"; then
            echo "Creating nginx_net network..."
            docker network create nginx_net
          else
            echo "nginx_net network already exists"
          fi

          # Deploy with better error handling
          cd ${{ secrets.SERVER_PATH }}

          echo "Stopping containers..."
          docker compose down --timeout 30 || true

          echo "Starting new containers..."
          docker compose up -d

          echo "Restarting nginx..."
          docker restart nginx || echo "Nginx restart failed, continuing..."

          echo "Verifying deployment..."
          docker compose ps

          echo "Deployment completed successfully!"
          ENDSSH

      - name: Health check (optional)
        run: |
          ssh ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} << 'ENDSSH'
          # Wait a bit for containers to start
          sleep 10

          # Check if containers are running
          if docker compose -f ${{ secrets.SERVER_PATH }}/docker-compose.yml ps | grep -q "Up"; then
            echo "Health check passed - containers are running"
          else
            echo "Health check failed - some containers may not be running"
            docker compose -f ${{ secrets.SERVER_PATH }}/docker-compose.yml ps
            exit 1
          fi
          ENDSSH

      - name: Cleanup old images
        run: |
          ssh ${{ secrets.SERVER_USERNAME }}@${{ secrets.SERVER_ADDRESS }} << 'ENDSSH'
          echo "Cleaning up old Docker images..."
          docker image prune -f --filter "until=24h"
          ENDSSH

      - name: Cleanup SSH key
        if: always()  # Always run this step
        run: |
          rm -f ~/.ssh/id_rsa
          echo "SSH key cleaned up"

      - name: Deployment summary
        run: |
          echo "🎉 Deployment completed successfully!"
          echo "Version: ${{ env.RELEASE_VERSION }}"
          echo "Repository: ${{ github.event.repository.name }}"
